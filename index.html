<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal 100+ Web Games Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎮 Arcade 100+ Mini Games</h1>
        <button id="backBtn" class="hidden" onclick="returnToHome()">⬅️ Kembali ke Menu</button>
    </header>

    <main>
        <!-- Tampilan Daftar Game (Grid) -->
        <section id="menuSection">
            <h2>Pilih Game Anda</h2>
            <div id="gameGrid" class="grid-container">
                <!-- Daftar game akan di-generate otomatis via JavaScript -->
            </div>
        </section>

        <!-- Tampilan Area Bermain Game -->
        <section id="gameSection" class="hidden">
            <h2 id="gameTitle">Judul Game</h2>
            <div id="gameViewport">
                <!-- Script game akan menyuntikkan elemen UI-nya di sini -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Pro Game Portal. Built with Clean Code Architecture.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
