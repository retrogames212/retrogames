<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Arcade Pro - 100 Mini Games</title>
    <style>
        :root {
            --bg-deep: #050b14;
            --bg-card: #0f172a;
            --bg-card-hover: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-icon { font-size: 2rem; }

        h1 {
            font-size: 1.6rem;
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle { font-size: 0.8rem; color: var(--text-sub); }

        .nav-controls { display: flex; gap: 15px; align-items: center; }

        .search-box {
            padding: 10px 16px;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.9);
            color: white;
            font-size: 0.9rem;
            width: 240px;
            outline: none;
            transition: 0.3s;
        }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); width: 270px; }

        .btn-main {
            background: linear-gradient(135deg, #0284c7, #2563eb);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 99px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-main:hover { transform: translateY(-2px); opacity: 0.9; }

        main { flex: 1; max-width: 1400px; width: 100%; margin: 0 auto; padding: 30px 20px; }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: 0.25s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 150px;
        }

        .game-card:hover {
            transform: translateY(-4px);
            background: var(--bg-card-hover);
            border-color: var(--accent);
            box-shadow: 0 10px 20px -5px var(--accent-glow);
        }

        .game-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .game-info h3 { font-size: 1.05rem; margin-bottom: 6px; color: #fff; padding-right: 40px; }
        .game-info p { font-size: 0.8rem; color: var(--text-sub); line-height: 1.3; }
        .play-tag { margin-top: 12px; font-size: 0.8rem; font-weight: bold; color: var(--accent); }

        #playerView { display: none; }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .game-viewport {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .arcade-display { font-size: 2.2rem; font-weight: bold; color: var(--accent); margin: 15px 0; }
        .arcade-input {
            padding: 12px 18px; font-size: 1rem; border-radius: 8px; border: 1px solid var(--border);
            background: #050b14; color: white; width: 200px; text-align: center; outline: none; margin-right: 8px;
        }
        .arcade-input:focus { border-color: var(--accent); }

        .arcade-btn {
            background: var(--accent); color: #050b14; border: none; padding: 12px 24px;
            border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .arcade-btn:hover { opacity: 0.9; }
        .arcade-msg { margin-top: 20px; font-size: 1.1rem; font-weight: bold; min-height: 30px; }

        footer { text-align: center; padding: 25px; color: var(--text-sub); font-size: 0.8rem; border-top: 1px solid var(--border); background: var(--bg-card); margin-top: auto; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span class="logo-icon">🕹️</span>
            <div>
                <h1>Mega Arcade Pro</h1>
                <div class="subtitle">Koleksi 100 Mini Games Interaktif</div>
            </div>
        </div>
        <div class="nav-controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Cari game (1-100)..." onkeyup="filterGames()">
            <button class="btn-main" onclick="goHome()">🏠 Menu Utama</button>
        </div>
    </header>

    <main>
        <div id="homeView">
            <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                <h2>Daftar Seluruh Game (<span id="counter">100</span>)</h2>
            </div>
            <div id="gamesGrid" class="games-grid"></div>
        </div>

        <div id="playerView">
            <div class="player-header">
                <div>
                    <h2 id="activeTitle">Judul</h2>
                    <p id="activeDesc" style="color:var(--text-sub); font-size:0.85rem; margin-top:2px;"></p>
                </div>
                <button class="btn-main" onclick="goHome()">⬅️ Kembali</button>
            </div>
            <div class="game-viewport" id="gameViewport"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Mega Arcade Pro. Fully Loaded 100 Games Edition.</p>
    </footer>

    <script>
        const categories = [
            { name: "Tebak Angka", desc: "Tebak angka akurat dari batas yang ditentukan.", type: "guess" },
            { name: "Batu Gunting Kertas", desc: "Laga klasik vs kecerdasan buatan bot.", type: "rps" },
            { name: "Lempar Dadu", desc: "Uji hoki lemparan mata dadu acak.", type: "dice" },
            { name: "Ketuk Kilat (Clicker)", desc: "Seberapa cepat jarimu menekan tombol dalam 10 detik?", type: "clicker" },
            { name: "Lempar Koin", desc: "Pilih Angka atau Gambar pada koin berputar.", type: "coin" },
            { name: "Hitung Cepat Matematika", desc: "Selesaikan operasi hitung dasar secepat kilat.", type: "math" },
            { name: "Tebak Kotak Hoki", desc: "Pilih kotak berhadiah atau jebakan bom.", type: "box" }
        ];

        const games = [];
        for (let i = 1; i <= 100; i++) {
            let cat = categories[(i - 1) % categories.length];
            games.push({
                id: i,
                title: `Game #${i}: ${cat.name} ${Math.ceil(i / categories.length)}`,
                desc: `${cat.desc} (Arena Level ${i})`,
                type: cat.type
            });
        }

        function renderGrid(list) {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = "";
            list.forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <span class="game-badge">#${g.id}</span>
                    <div class="game-info">
                        <h3>${g.title}</h3>
                        <p>${g.desc}</p>
                    </div>
                    <div class="play-tag">Mainkan ➔</div>
                `;
                card.onclick = () => launchGame(g);
                grid.appendChild(card);
            });
            document.getElementById('counter').textContent = list.length;
        }

        function filterGames() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const res = games.filter(g => g.title.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q));
            renderGrid(res);
        }

        function goHome() {
            document.getElementById('playerView').style.display = 'none';
            document.getElementById('homeView').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function launchGame(game) {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('playerView').style.display = 'block';
            document.getElementById('activeTitle').textContent = game.title;
            document.getElementById('activeDesc').textContent = game.desc;
            
            const vp = document.getElementById('gameViewport');
            vp.innerHTML = "";

            if (game.type === 'guess') {
                vp.innerHTML = `
                    <p style="color:var(--text-sub); margin-bottom:10px;">Tebak angka rahasia (1 - 10)</p>
                    <div>
                        <input type="number" id="gInput" class="arcade-input" min="1" max="10" placeholder="Angka">
                        <button class="arcade-btn" onclick="playGuess(${game.id})">Tebak</button>
                    </div>
                    <div id="gMsg" class="arcade-msg"></div>
                `;
                window.targetVal = (game.id * 3) % 10 + 1;
            } else if (game.type === 'rps') {
                vp.innerHTML = `
                    <p style="margin-bottom:20px;">Tentukan pilihanmu:</p>
                    <div>
                        <button class="arcade-btn" style="margin:5px;" onclick="playRPS('Batu')">✊ Batu</button>
                        <button class="arcade-btn" style="margin:5px;" onclick="playRPS('Gunting')">✌️ Gunting</button>
                        <button class="arcade-btn" style="margin:5px;" onclick="playRPS('Kertas')">🖐️ Kertas</button>
                    </div>
                    <div id="rpsMsg" class="arcade-msg"></div>
                `;
            } else if (game.type === 'dice') {
                vp.innerHTML = `
                    <div id="diceDisp" class="arcade-display">🎲 ⚀</div>
                    <button class="arcade-btn" onclick="playDice()">Lempar Dadu</button>
                    <div id="diceMsg" class="arcade-msg"></div>
                `;
            } else if (game.type === 'clicker') {
                window.clicks = 0; window.timeLeft = 10; window.started = false;
                vp.innerHTML = `
                    <div id="clickScore" class="arcade-display">0</div>
                    <p id="clickTimer" style="color:var(--text-sub); margin-bottom:15px;">Waktu: 10 detik</p>
                    <button id="clickBtn" class="arcade-btn" onclick="handleC()">KLIK SECEPATNYA!</button>
                    <div id="clickMsg" class="arcade-msg"></div>
                `;
            } else if (game.type === 'coin') {
                vp.innerHTML = `
                    <div id="coinDisp" class="arcade-display">🪙 ?</div>
                    <div>
                        <button class="arcade-btn" style="margin:5px;" onclick="playCoin('Angka')">Pilih Angka</button>
                        <button class="arcade-btn" style="margin:5px;" onclick="playCoin('Gambar')">Pilih Gambar</button>
                    </div>
                    <div id="coinMsg" class="arcade-msg"></div>
                `;
            } else if (game.type === 'math') {
                let n1 = (game.id % 8) + 2; let n2 = (game.id % 6) + 2;
                window.mAns = n1 * n2;
                vp.innerHTML = `
                    <p style="color:var(--text-sub);">Berapa hasil dari:</p>
                    <div class="arcade-display">${n1} × ${n2} = ?</div>
                    <div>
                        <input type="number" id="mInput" class="arcade-input" placeholder="Jawaban">
                        <button class="arcade-btn" onclick="playMath()">Jawab</button>
                    </div>
                    <div id="mMsg" class="arcade-msg"></div>
                `;
            } else if (game.type === 'box') {
                vp.innerHTML = `
                    <p style="margin-bottom:15px; color:var(--text-sub);">Pilih 1 dari 3 kotak misteri:</p>
                    <div>
                        <button class="arcade-btn" style="margin:5px;" onclick="playBox(1)">📦 Kotak 1</button>
                        <button class="arcade-btn" style="margin:5px;" onclick="playBox(2)">📦 Kotak 2</button>
                        <button class="arcade-btn" style="margin:5px;" onclick="playBox(3)">📦 Kotak 3</button>
                    </div>
                    <div id="boxMsg" class="arcade-msg"></div>
                `;
                window.luckyBox = (game.id % 3) + 1;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function playGuess(id) {
            let v = parseInt(document.getElementById('gInput').value);
            let m = document.getElementById('gMsg');
            let t = window.targetVal;
            if (v === t) { m.style.color = "#4ade80"; m.textContent = `🎉 Benar! Angkanya ${t}`; }
            else if (v < t) { m.style.color = "#f87171"; m.textContent = "📈 Terlalu kecil!"; }
            else { m.style.color = "#f87171"; m.textContent = "📉 Terlalu besar!"; }
        }

        function playRPS(p) {
            let choices = ['Batu', 'Gunting', 'Kertas'];
            let bot = choices[Math.floor(Math.random() * choices.length)];
            let m = document.getElementById('rpsMsg');
            if (p === bot) { m.style.color = "#fbbf24"; m.textContent = `🤝 Seri! Bot juga memilih ${bot}`; }
            else if ((p==='Batu'&&bot==='Gunting')||(p==='Gunting'&&bot==='Kertas')||(p==='Kertas'&&bot==='Batu')) {
                m.style.color = "#4ade80"; m.textContent = `🎉 Menang! Bot memilih ${bot}`;
            } else { m.style.color = "#f87171"; m.textContent = `❌ Kalah! Bot memilih ${bot}`; }
        }

        function playDice() {
            let faces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            let r = Math.floor(Math.random() * 6);
            document.getElementById('diceDisp').textContent = `🎲 ${faces[r]}`;
            document.getElementById('diceMsg').style.color = "#38bdf8";
            document.getElementById('diceMsg').textContent = `Hasil Dadu: ${r + 1}`;
        }

        function handleC() {
            if (!window.started) {
                window.started = true; window.clicks = 0; window.timeLeft = 10;
                let btn = document.getElementById('clickBtn');
                btn.textContent = "KLIK TERUS!";
                let iv = setInterval(() => {
                    window.timeLeft--;
                    document.getElementById('clickTimer').textContent = `Waktu: ${window.timeLeft} detik`;
                    if (window.timeLeft <= 0) {
                        clearInterval(iv);
                        btn.disabled = true; btn.style.opacity = "0.5";
                        document.getElementById('clickMsg').style.color = "#4ade80";
                        document.getElementById('clickMsg').textContent = `Waktu habis! Total Klik: ${window.clicks}`;
                    }
                }, 1000);
            }
            window.clicks++;
            document.getElementById('clickScore').textContent = window.clicks;
        }

        function playCoin(c) {
            let res = Math.random() < 0.5 ? 'Angka' : 'Gambar';
            let m = document.getElementById('coinMsg');
            document.getElementById('coinDisp').textContent = `🪙 ${res}`;
            if (c === res) { m.style.color = "#4ade80"; m.textContent = `🎉 Tepat! Koin menunjukkan ${res}`; }
            else { m.style.color = "#f87171"; m.textContent = `❌ Meleset! Koin menunjukkan ${res}`; }
        }

        function playMath() {
            let v = parseInt(document.getElementById('mInput').value);
            let m = document.getElementById('mMsg');
            if (v === window.mAns) { m.style.color = "#4ade80"; m.textContent = "🎉 Jawaban Benar!"; }
            else { m.style.color = "#f87171"; m.textContent = `❌ Salah! Jawaban: ${window.mAns}`; }
        }

        function playBox(num) {
            let m = document.getElementById('boxMsg');
            if (num === window.luckyBox) { m.style.color = "#4ade80"; m.textContent = "🎉 Hoki! Kamu menemukan hadiah utama!"; }
            else { m.style.color = "#f87171"; m.textContent = "💥 Oops, kotak ini kosong/jebakan!"; }
        }

        renderGrid(games);
    </script>
</body>
</html>
