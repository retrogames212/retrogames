<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Retro Games Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        p { color: #94a3af; margin-bottom: 20px; }
        
        .container {
            width: 100%;
            max-width: 850px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        #gameContainer {
            width: 640px;
            height: 480px;
            max-width: 100%;
            margin: 20px auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .rom-selector {
            margin: 15px 0;
            padding: 15px;
            background: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        select, input[type="file"] {
            padding: 8px;
            border-radius: 6px;
            background: #1e293b;
            color: #f8fafc;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🕹️ Retro Games</h1>
        <p>Play your favorite games on web!</p>

        <div class="rom-selector">
            <div>
                <label>Select Console / Core: </label>
                <select id="consoleSelect">
                    <option value="nes">NES (Nintendo)</option>
                    <option value="snes">SNES (Super Nintendo)</option>
                    <option value="gb">Game Boy</option>
                    <option value="gbc">Game Boy Color</option>
                    <option value="gba">Game Boy Advance</option>
                    <option value="segaMD">Sega Mega Drive / Genesis</option>
                    <option value="n64">Nintendo 64</option>
                    <option value="psx">PlayStation (PS1)</option>
                    <option value="nds">Nintendo DS</option>
                    <option value="arcade">Arcade (MAME)</option>
                </select>
            </div>
            <div>
                <label>File ROM: </label>
                <input type="file" id="romUpload">
            </div>
        </div>

        <div id="gameContainer">
            <p style="color: #64748b; line-height: 480px; margin: 0;">Select a ROM file above to start playing.</p>
        </div>
    </div>

    <script>
        document.getElementById('romUpload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const romUrl = URL.createObjectURL(file);
            const selectedCore = document.getElementById('consoleSelect').value;
            const container = document.getElementById('gameContainer');

            container.innerHTML = '';

            const iframe = document.createElement('iframe');
            container.appendChild(iframe);

            const iframeDoc = iframe.contentWindow.document;

            iframeDoc.open();
            iframeDoc.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
                        #game { width:100%; height:100%; }
                    </style>
                </head>
                <body>
                    <div id="game"></div>
                    <script>
                        window.EJS_player = '#game';
                        window.EJS_core = '${selectedCore}';
                        window.EJS_gameUrl = '${romUrl}';
                        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                    <\/script>
                    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"><\/script>
                </body>
                </html>
            `);
            iframeDoc.close();
        });
    </script>

</body>
</html>
