<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Cloud Desktop Launcher</title>
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-card: #161b22;
            --accent: #238636;
            --accent-hover: #2ea043;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
            --border: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .portal-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .icon { font-size: 3.5rem; margin-bottom: 15px; }
        
        h1 { font-size: 1.5rem; margin-bottom: 10px; color: var(--text-main); }
        
        p { 
            color: var(--text-sub); 
            font-size: 0.9rem; 
            line-height: 1.5; 
            margin-bottom: 25px; 
        }

        .btn-free {
            display: block;
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
            margin-bottom: 12px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }

        .btn-free:hover { background: var(--accent-hover); transform: translateY(-1px); }

        .btn-alt {
            background: transparent;
            color: #58a6ff;
            border: 1px solid var(--border);
        }
        .btn-alt:hover { background: rgba(56, 139, 253, 0.1); border-color: #58a6ff; }

        .footer-note {
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <div class="icon">🚀</div>
        <h1>Free Cloud Desktop Hub</h1>
        <p>Akses environment virtual gratis tanpa sewa VPS. Pilih platform gratisan di bawah untuk langsung membuka terminal/desktop di browser:</p>
        
        <!-- Tombol 1: GitHub Codespaces (Gratis kuota bulanan dari GitHub) -->
        <a href="https://github.com/login?return_to=%2Fcodespaces" target="_blank" class="btn-free">
            💻 Buka GitHub Codespaces (Gratis)
        </a>

        <!-- Tombol 2: Google Cloud Shell / Terminal Gratis -->
        <a href="https://shell.cloud.google.com" target="_blank" class="btn-free btn-alt">
            ☁️ Buka Google Cloud Shell
        </a>

        <div class="footer-note">
            * 100% Gratis menggunakan jatah resource bawaan akun GitHub/Google Anda.
        </div>
    </div>

</body>
</html>
