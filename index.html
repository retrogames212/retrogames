<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web RDP Client & Cloud Desktop</title>
    <style>
        :root {
            --bg-deep: #050508;
            --bg-card: #0d1117;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.4);
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Config Header */
        header {
            background: #0b0f19;
            border-bottom: 1px solid var(--border);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        h1 { font-size: 1.2rem; color: #fff; font-weight: 700; }
        .subtitle { font-size: 0.75rem; color: var(--text-sub); }

        .connection-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-rdp {
            background: #020617;
            border: 1px solid var(--border);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            width: 200px;
            outline: none;
        }
        .input-rdp:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

        .btn-connect {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-connect:hover { opacity: 0.9; }

        /* Workspace Viewport */
        main {
            flex: 1;
            position: relative;
            background: #020617;
            display: flex;
            flex-direction: column;
        }

        #screenContainer {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* Overlay sebelum koneksi aktif */
        #connectOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 8, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            text-align: center;
            padding: 20px;
        }

        /* Canvas / iframe target RDP stream (noVNC / Guacamole / WebSockets) */
        #rdpCanvasFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .status-badge {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ef4444;
            margin-right: 6px;
        }
        .status-badge.connected { background: #22c55e; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span>💻</span>
            <div>
                <h1>Web RDP & VNC Client</h1>
                <div class="subtitle">Gateway Desktop Jarak Jauh via WebSocket</div>
            </div>
        </div>
        <div class="connection-form">
            <input type="text" id="wsHost" class="input-rdp" placeholder="Host WebSocket (cth: ws://IP:6080)" value="ws://localhost:6080">
            <input type="password" id="wsPass" class="input-rdp" placeholder="Password RDP (Opsional)" style="width: 150px;">
            <button class="btn-connect" onclick="initRDPConnection()">Konek RDP</button>
        </div>
    </header>

    <main>
        <div id="screenContainer">
            <!-- Tampilan awal sebelum koneksi -->
            <div id="connectOverlay">
                <div style="font-size: 3rem; margin-bottom: 15px;">🌐</div>
                <h2 style="margin-bottom: 10px;">Belum Terhubung ke Server RDP</h2>
                <p style="color: var(--text-sub); max-width: 450px; font-size: 0.9rem; margin-bottom: 20px;">
                    Masukkan alamat WebSocket dari jembatan server RDP Anda (seperti <code>websockify</code> atau <code>Guacamole</code>) di panel atas, lalu klik <strong>Konek RDP</strong>.
                </p>
                <div style="font-size: 0.8rem; color: #64748b;">
                    <span class="status-badge" id="indicator"></span> Status: <span id="statusText">Menunggu Konfigurasi...</span>
                </div>
            </div>

            <!-- Frame tempat stream RDP (noVNC / HTML5 VNC Client) akan merender layar remote -->
            <iframe id="rdpCanvasFrame" src=""></iframe>
        </div>
    </main>

    <script>
        function initRDPConnection() {
            let wsUrl = document.getElementById('wsHost').value.trim();
            let pass = document.getElementById('wsPass').value;
            let overlay = document.getElementById('connectOverlay');
            let frame = document.getElementById('rdpCanvasFrame');
            let indicator = document.getElementById('indicator');
            let statusText = document.getElementById('statusText');

            if (!wsUrl) {
                alert("Masukkan URL WebSocket RDP yang valid!");
                return;
            }

            statusText.textContent = "Menghubungkan ke " + wsUrl + "...";
            indicator.style.background = "#f59e0b"; // Kuning (Connecting)

            // Simulasi handshake koneksi WebSocket / VNC Client 
            // Jika Anda menggunakan noVNC, format URL framenya biasanya mengarah ke vnc.html?autoconnect=true&ws=...
            setTimeout(() => {
                try {
                    // Contoh integrasi path client VNC berbasis web standar (noVNC)
                    // Anda bisa menyesuaikan parameter path sesuai backend server RDP Anda.
                    let targetStreamUrl = `https://novnc.com/noVNC/vnc.html?autoconnect=true&resize=scale&websocket=${encodeURIComponent(wsUrl.replace('ws://', '').replace('wss://', ''))}&password=${encodeURIComponent(pass)}`;
                    
                    frame.src = targetStreamUrl;
                    frame.style.display = "block";
                    overlay.style.display = "none";
                    
                    indicator.classList.add('connected');
                    statusText.textContent = "Terhubung ke Remote Desktop";
                } catch (e) {
                    indicator.style.background = "#ef4444";
                    statusText.textContent = "Koneksi Gagal / Server Tidak Merespons";
                }
            }, 1000);
        }
    </script>
</body>
</html>
