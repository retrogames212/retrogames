<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Retro Games</title>
    <script type="text/javascript" src="https://www.dropbox.com/static/api/2/dropins.js" id="dropboxjs" data-app-key="n1b5dxdb6zb0drt"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; text-align: center; }
        p { color: #94a3af; margin-bottom: 20px; text-align: center; }
        
        .container {
            width: 100%;
            max-width: 900px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        #gameContainer {
            width: 640px;
            height: 480px;
            max-width: 100%;
            margin: 20px auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .rom-selector {
            margin: 15px 0;
            padding: 15px;
            background: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        select, input[type="file"], input[type="text"], .btn {
            padding: 10px 15px;
            border-radius: 6px;
            background: #1e293b;
            color: #f8fafc;
            border: 1px solid #334155;
            outline: none;
        }

        input[type="text"] {
            flex: 1;
            min-width: 250px;
        }

        .btn {
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: background 0.2s;
        }

        .dbx-btn { background: #0061fe; color: white; }
        .dbx-btn:hover { background: #004ecc; }

        .url-btn { background: #10b981; color: white; }
        .url-btn:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🕹️ Universal Retro Games</h1>
        <p>Play retro games from local files, Dropbox, or other direct cloud links!</p>

        <div class="rom-selector">
            <div style="text-align: center;">
                <label><strong>Pilih Konsol / Core:</strong> </label>
                <select id="consoleSelect">
                    <option value="nes">NES (Nintendo)</option>
                    <option value="snes">SNES (Super Nintendo)</option>
                    <option value="gb">Game Boy</option>
                    <option value="gbc">Game Boy Color</option>
                    <option value="gba">Game Boy Advance</option>
                    <option value="segaMD">Sega Mega Drive / Genesis</option>
                    <option value="n64">Nintendo 64</option>
                    <option value="psx">PlayStation (PS1)</option>
                    <option value="nds">Nintendo DS</option>
                    <option value="arcade">Arcade (MAME)</option>
                </select>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #334155; width: 100%;">

            <!-- Opsi 1: File Lokal -->
            <div class="row-group">
                <label>📁 From Device:</label>
                <input type="file" id="romUpload">
            </div>

            <div class="row-group">
                <label>☁️ From Cloud:</label>
                <button type="button" id="dropboxBtn" class="btn dbx-btn">Choose from Dropbox</button>
            </div>

            <div class="row-group">
                <label>🔗 Direct Link:</label>
                <input type="text" id="romUrlInput" placeholder="https://example.com/game.zip (or another direct cloud link)">
                <button type="button" onclick="loadFromUrl()" class="btn url-btn">Load URL</button>
            </div>
        </div>

        <div id="gameContainer">
            <p style="color: #64748b; line-height: 480px; text-align: center; margin: 0;">Select a ROM file to start playing.</p>
        </div>
    </div>

    <script>
        function loadFromUrl() {
            let url = document.getElementById('romUrlInput').value.trim();
            const selectedCore = document.getElementById('consoleSelect').value;
            if (url) {
                const proxiedUrl = "https://corsproxy.io/?" + encodeURIComponent(url);
                loadGame(proxiedUrl, selectedCore);
            } else {
                alert('Silakan masukkan URL file ROM terlebih dahulu!');
            }
        }
        async function loadGame(romUrl, selectedCore) {
            const container = document.getElementById('gameContainer');
            container.innerHTML = '<p style="color: #38bdf8; line-height: 480px; text-align: center; margin: 0;">Sedang mengunduh ROM...</p>';

            try {
                // Download file secara aman lewat fetch untuk mengatasi error jaringan/CORS
                const response = await fetch(romUrl);
                if (!response.ok) throw new Error('Gagal mengambil file dari server.');
                
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                container.innerHTML = '';
                const iframe = document.createElement('iframe');
                container.appendChild(iframe);

                const iframeDoc = iframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <style>
                            body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
                            #game { width:100%; height:100%; }
                        </style>
                    </head>
                    <body>
                        <div id="game"></div>
                        <script>
                            window.EJS_player = '#game';
                            window.EJS_core = '${selectedCore}';
                            window.EJS_gameUrl = '${blobUrl}';
                            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                        <\/script>
                        <script src="https://cdn.emulatorjs.org/stable/data/loader.js"><\/script>
                    </body>
                    </html>
                `);
                iframeDoc.close();
            } catch (error) {
                container.innerHTML = '<p style="color: #ef4444; line-height: 480px; text-align: center; margin: 0;">Error: Gagal memuat ROM. Periksa kembali link Anda!</p>';
                console.error(error);
            }
        }

        document.getElementById('romUpload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const romUrl = URL.createObjectURL(file);
            const selectedCore = document.getElementById('consoleSelect').value;
            loadGame(romUrl, selectedCore);
        });

        document.getElementById('dropboxBtn').addEventListener('click', function() {
            const selectedCore = document.getElementById('consoleSelect').value;
            
            Dropbox.choose({
                success: function(files) {
                    let directUrl = files[0].link.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
                    loadGame(directUrl, selectedCore);
                },
                cancel: function() {},
                linkType: "preview",
                extensions: ['.nes', '.snes', '.smc', '.gb', '.gbc', '.gba', '.gen', '.md', '.z64', '.bin', '.iso', '.zip']
            });
        });

        function loadFromUrl() {
            const url = document.getElementById('romUrlInput').value.trim();
            const selectedCore = document.getElementById('consoleSelect').value;
            if (url) {
                loadGame(url, selectedCore);
            } else {
                alert('Please enter the ROM file URL first!');
            }
        }
    </script>

</body>
</html>
